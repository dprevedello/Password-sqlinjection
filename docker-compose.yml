services:

  db:
    image: mariadb:11
    container_name: sql_injection_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sql_injection_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p\"$MARIADB_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  php:
    build: ./php
    container_name: sql_injection_php
    restart: unless-stopped
    environment:
      db_host: db
      db_user: ${MYSQL_USER}
      db_pass: ${MYSQL_PASSWORD}
      db_name: ${MYSQL_DATABASE}
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sql_injection_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sql_injection_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sql_injection_net

  nginx:
    build: ./nginx
    container_name: sql_injection_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - php
      - phpmyadmin
    networks:
      - sql_injection_net

volumes:
  db_data:
  nginx_certs:

networks:
  sql_injection_net:
    driver: bridge
